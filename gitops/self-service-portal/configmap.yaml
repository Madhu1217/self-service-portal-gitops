apiVersion: v1
kind: ConfigMap

metadata:
  name: self-service-portal-config
  namespace: ssp

  labels:
    app.kubernetes.io/name: self-service-portal
    app.kubernetes.io/component: backend

data:
  FLASK_ENV: "production"
  PORT: "5000"

  LOG_LEVEL: "INFO"

  APP_NAME: "Self Service Portal"

  GUNICORN_WORKERS: "2"

  GUNICORN_TIMEOUT: "60"

  TZ: "Asia/Kolkata"
  DATABASE_URL: "postgresql://ssp_user:password@rds-endpoint:5432/ssp"

  ADMIN_USERNAME: "admin"

  ADMIN_EMAIL: "madhu151312@gmail.com"

  SMTP_HOST: ""

  SMTP_PORT: "587"

  SMTP_USER: ""

  SMTP_FROM: ""
